spring.application.name=MultipleModelsApplication

# --- Google Gemini Configuration ---
spring.ai.google.genai.api-key=${GOOGLE_GENAI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash-lite
spring.ai.model.embedding=none

# --- DeepSeek Configuration (Official Starter) ---
# Note: Ensure you use 'deepseek' in the namespace
spring.ai.deepseek.api-key=${DEEPSEEK_API_KEY}
spring.ai.deepseek.chat.options.model=deepseek-chat
server.port=8090